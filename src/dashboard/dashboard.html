<!doctype html>
<html lang="tr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="../vendor/leaflet/leaflet.css" />
    <link rel="stylesheet" href="dashboard.css" />
    <title>İlanlarım — Emlak Takip</title>
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <span class="logo"></span>
        <h1 data-i18n="dashHeading"></h1>
        <span id="count" class="count"></span>
      </div>
      <div class="actions">
        <select id="lang" class="sel" data-i18n-attr="title:langTip">
          <option value="auto" data-i18n="langAuto"></option>
          <option value="tr">Türkçe</option>
          <option value="en">English</option>
        </select>
        <select id="theme" class="sel" data-i18n-attr="title:themeTip">
          <option value="system" data-i18n="themeSystem"></option>
          <option value="light" data-i18n="themeLight"></option>
          <option value="dark" data-i18n="themeDark"></option>
        </select>
        <select id="storageArea" class="sel" data-i18n-attr="title:storageTip">
          <option value="local" data-i18n="storageLocal"></option>
          <option value="sync" data-i18n="storageSync"></option>
        </select>
        <label class="switch" data-i18n-attr="title:autoSaveTip">
          <input id="autoSave" type="checkbox" />
          <span data-i18n="autoSaveLabel"></span>
        </label>
        <input
          id="search"
          class="search"
          type="search"
          data-i18n-attr="placeholder:searchPlaceholder"
        />
        <button
          id="selectMode"
          class="btn ghost"
          data-i18n="selectModeBtn"
        ></button>
        <button
          id="exportJson"
          class="btn ghost"
          data-i18n="exportJson"
        ></button>
        <button id="exportCsv" class="btn ghost" data-i18n="exportCsv"></button>
        <label class="btn ghost file">
          <span data-i18n="importBtn"></span>
          <input id="importFile" type="file" accept="application/json" hidden />
        </label>
      </div>
    </header>

    <section class="filters">
      <select id="fCategory" class="sel"></select>
      <select id="fType" class="sel"></select>
      <select id="fStatus" class="sel"></select>
      <select id="fTag" class="sel"></select>
      <label class="switch" data-i18n-attr="title:filterDevrenTip">
        <input id="fDevren" type="checkbox" />
        <span data-i18n="filterDevren"></span>
      </label>
      <select id="sort" class="sel"></select>
      <button
        id="clearFilters"
        class="btn tiny"
        data-i18n="resetFilters"
      ></button>
      <div class="view-switch">
        <button
          id="viewList"
          class="btn tiny active"
          data-i18n="viewList"
        ></button>
        <button id="viewMap" class="btn tiny" data-i18n="viewMap"></button>
      </div>
    </section>

    <div id="selectBar" class="select-bar hidden">
      <span id="selCount" class="sel-count"></span>
      <button id="selectAll" class="btn tiny" data-i18n="selectAll"></button>
      <button
        id="deleteSelected"
        class="btn tiny danger"
        data-i18n="deleteSelected"
      ></button>
      <button
        id="cancelSelect"
        class="btn tiny"
        data-i18n="cancelSelect"
      ></button>
    </div>

    <main id="grid" class="grid"></main>
    <div id="map" class="map hidden"></div>
    <div id="mapNote" class="map-note hidden" data-i18n="mapNoGeo"></div>
    <div id="empty" class="empty hidden" data-i18n="emptyState"></div>

    <template id="card-tpl">
      <article class="card">
        <label class="card-select">
          <input type="checkbox" class="sel-check" tabindex="-1" />
        </label>
        <a class="card-thumb" target="_blank" rel="noopener">
          <img alt="" />
          <span class="photo-count hidden"></span>
        </a>
        <div class="card-body">
          <div class="card-badges"></div>
          <a class="card-title" target="_blank" rel="noopener"></a>
          <div class="card-price">
            <span class="price-now"></span>
            <span class="price-delta"></span>
          </div>
          <div class="card-loc">
            <span class="loc-text"></span>
            <button
              class="btn tiny locate-btn hidden"
              data-i18n="locateBtn"
            ></button>
            <a
              class="map-link hidden"
              target="_blank"
              rel="noopener"
              data-i18n="mapLink"
            ></a>
          </div>
          <div class="card-specs"></div>
          <div class="card-contact hidden"></div>

          <div class="card-controls">
            <select
              class="status-sel"
              data-i18n-attr="title:statusTip"
            ></select>
            <input
              class="tags-input"
              data-i18n-attr="placeholder:tagsPlaceholder;title:tagsTip"
            />
          </div>
          <textarea
            class="notes"
            rows="2"
            data-i18n-attr="placeholder:notesPlaceholder"
          ></textarea>

          <div class="card-foot">
            <span class="saved-at"></span>
            <div class="foot-actions">
              <button
                class="btn tiny attrs-btn hidden"
                data-i18n="attrsBtn"
              ></button>
              <button
                class="btn tiny gallery-btn hidden"
                data-i18n="galleryBtn"
              ></button>
              <button
                class="btn tiny features-btn hidden"
                data-i18n="featuresBtn"
              ></button>
              <button
                class="btn tiny desc-btn hidden"
                data-i18n="descBtn"
              ></button>
              <button
                class="btn tiny history-btn"
                data-i18n="priceHistoryBtn"
              ></button>
            </div>
          </div>
          <div class="history hidden"></div>
          <div class="desc hidden"></div>
          <div class="features-box hidden"></div>
          <div class="attrs-box hidden"></div>
          <div class="gallery-box hidden"></div>
        </div>
      </article>
    </template>

    <script src="../vendor/leaflet/leaflet.js"></script>
    <script type="module" src="dashboard.js"></script>
  </body>
</html>
